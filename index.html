<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Моя Карта Валют</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; background: #222; font-family: Arial, sans-serif; }
        #map { height: 100vh; width: 100vw; background: #1a1a1a; }
        .search-container { position: absolute; top: 15px; left: 50px; z-index: 1000; }
        #countrySearch { padding: 10px 15px; border-radius: 20px; border: 1px solid #ccc; width: 220px; outline: none; }
        .info-card {
            position: absolute; top: 15px; right: 15px; z-index: 1000;
            width: 260px; background: white; border-radius: 12px; padding: 20px;
            display: none; box-shadow: 0 5px 20px rgba(0,0,0,0.8); color: #333;
        }
        .rate { font-weight: bold; color: #2ecc71; float: right; }
        .btn { display: block; text-align: center; background: #3498db; color: white; padding: 10px; text-decoration: none; border-radius: 5px; margin-top: 15px; }
    </style>
</head>
<body>

<div class="search-container">
    <input type="text" id="countrySearch" list="countriesList" placeholder="Введите страну (English)...">
    <datalist id="countriesList"></datalist>
</div>

<div id="map"></div>

<div id="infoCard" class="info-card">
    <h2 id="cName" style="margin: 0 0 10px 0; font-size: 20px;"></h2>
    <p id="currName" style="margin: 0 0 15px 0; color: #666; font-size: 14px;"></p>
    <div style="font-size: 14px; border-top: 1px solid #eee; padding-top: 10px;">
        <div>1 USD <span id="rUSD" class="rate"></span></div>
        <div style="margin-top: 8px;">1 EUR <span id="rEUR" class="rate"></span></div>
        <div style="margin-top: 8px;">1 RUB <span id="rRUB" class="rate"></span></div>
    </div>
    <a id="bankLink" target="_blank" href="#" class="btn">Вид купюр</a>
    <button onclick="this.parentElement.style.display='none'" style="width: 100%; margin-top: 10px; cursor: pointer;">Закрыть</button>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const API_KEY = 'a26755f279-2e3bc8d143-tdy6r0';
    let countriesData = [];

    // Инициализация карты
    const map = L.map('map', { zoomControl: true }).setView([41.3, 69.2], 3);
    
    // Используем стандартную карту OpenStreetMap (она самая стабильная)
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    // 1. Загрузка списка стран
    fetch('https://restcountries.com/v3.1/all?fields=name,currencies,cca3,latlng')
        .then(r => r.json())
        .then(data => {
            countriesData = data;
            const list = document.getElementById('countriesList');
            data.sort((a, b) => a.name.common.localeCompare(b.name.common)).forEach(c => {
                const opt = document.createElement('option');
                opt.value = c.name.common;
                list.appendChild(opt);
            });
            console.log("Данные стран загружены");
            loadGeoJson();
        })
        .catch(err => alert("Ошибка загрузки стран: " + err));

    // 2. Загрузка границ для кликов
    function loadGeoJson() {
        fetch('https://raw.githubusercontent.com/datasets/geo-boundaries-world-110m/master/countries.geojson')
            .then(r => r.json())
            .then(json => {
                L.geoJSON(json, {
                    style: { color: '#3498db', weight: 1, fillOpacity: 0.1 },
                    onEachFeature: (feature, layer) => {
                        layer.on('click', (e) => {
                            L.DomEvent.stopPropagation(e);
                            updateCard(feature.properties.iso_a3);
                        });
                    }
                }).addTo(map);
                console.log("Границы загружены");
            });
    }
// 3. Обновление карточки
    async function updateCard(code) {
        const country = countriesData.find(c => c.cca3 === code);
        if (!country || !country.currencies) return;
        
        const cCode = Object.keys(country.currencies)[0];
        document.getElementById('cName').innerText = country.name.common;
        document.getElementById('currName').innerText = country.currencies[cCode].name + " (" + cCode + ")";
        document.getElementById('infoCard').style.display = 'block';
        document.getElementById('bankLink').href = https://www.google.com/search?q=${cCode}+banknote&tbm=isch;

        try {
            const response = await fetch(https://api.fastforex.io/fetch-multi?from=USD&to=EUR,RUB,${cCode}&api_key=${API_KEY});
            const result = await response.json();
            const rates = result.results;
            
            document.getElementById('rUSD').innerText = rates[cCode].toFixed(2);
            document.getElementById('rEUR').innerText = (rates[cCode] / rates['EUR']).toFixed(2);
            document.getElementById('rRUB').innerText = (rates[cCode] / rates['RUB']).toFixed(2);
        } catch (e) {
            alert("Ошибка API: возможно, закончились лимиты или неверный ключ.");
        }
    }

    // Поиск
    document.getElementById('countrySearch').addEventListener('change', function(e) {
        const val = e.target.value;
        const c = countriesData.find(x => x.name.common.toLowerCase() === val.toLowerCase());
        if(c) {
            map.flyTo(c.latlng, 4);
            updateCard(c.cca3);
        }
    });
</script>
</body>
</html>
